SecRuleEngine On
SecRequestBodyAccess On
SecRule REQUEST_HEADERS:Content-Type "(?:application(?:/soap\+|/)|text/)xml" \
     "id:'200000',phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=XML"
SecRule REQUEST_HEADERS:Content-Type "application/json" \
     "id:'200001',phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=JSON"
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject
SecRule REQBODY_ERROR "!@eq 0" \
"id:'200002', phase:2,t:none,log,deny,status:400,msg:'Failed to parse request body.',logdata:'%{reqbody_error_msg}',severity:2"
SecRule MULTIPART_STRICT_ERROR "!@eq 0" \
"id:'200003',phase:2,t:none,log,deny,status:400, \
msg:'Multipart request body failed strict validation: \
PE %{REQBODY_PROCESSOR_ERROR}, \
BQ %{MULTIPART_BOUNDARY_QUOTED}, \
BW %{MULTIPART_BOUNDARY_WHITESPACE}, \
DB %{MULTIPART_DATA_BEFORE}, \
DA %{MULTIPART_DATA_AFTER}, \
HF %{MULTIPART_HEADER_FOLDING}, \
LF %{MULTIPART_LF_LINE}, \
SM %{MULTIPART_MISSING_SEMICOLON}, \
IQ %{MULTIPART_INVALID_QUOTING}, \
IP %{MULTIPART_INVALID_PART}, \
IH %{MULTIPART_INVALID_HEADER_FOLDING}, \
FL %{MULTIPART_FILE_LIMIT_EXCEEDED}'"
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial
SecTmpDir /tmp/
SecDataDir /tmp/
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:(5|4)(0|1)[0-9])$"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecArgumentSeparator &
SecCookieFormat 0


SecRule MULTIPART_UNMATCHED_BOUNDARY "@eq 1" \ "id:'200004',phase:2,t:none,log,deny,msg:'Multipart parser detected a possible unmatched boundary.'"
SecRule TX:/^COR_/ "!@streq 0" \ "id:'200005',phase:2,t:none,deny,msg:'Coraza internal error flagged: %{MATCHED_VAR_NAME}'"
SecRule REQUEST_URI "@contains /etc/passwd" "id:990001,phase:1,deny,status:403,msg:'Custom LFI Protection: etc/passwd access denied',tag:'custom',tag:'LFI'"
SecRule REQUEST_URI "@contains /etc/shadow" "id:990002,phase:1,deny,status:403,msg:'Custom LFI Protection: etc/shadow access denied',tag:'custom',tag:'LFI'"
SecRule REQUEST_URI "@rx windows[\\/]system32" "id:990003,phase:1,deny,status:403,msg:'Custom LFI Protection: Windows System32 access denied',tag:'custom',tag:'LFI'"
SecRule ARGS "@rx \x60" "id:990004,phase:2,deny,status:403,msg:'Custom CMDi Protection: Backtick operator detected',tag:'custom',tag:'CMDi'"
SecRule REQUEST_HEADERS:User-Agent "@rx \$\{jndi:" "id:990005,phase:1,deny,status:403,msg:'Custom Log4Shell Protection: JNDI in User-Agent',tag:'custom',tag:'RCE'"
SecRule ARGS "@rx \x0d\x0a" "id:990006,phase:2,deny,status:403,msg:'Custom Protocol Protection: CRLF Injection detected',tag:'custom',tag:'Protocol'"
SecRule REQUEST_BODY "@rx <!DOCTYPE|<!ENTITY" "id:990007,phase:2,deny,status:403,msg:'Custom XXE Protection: DTD/Entity detected in body',tag:'custom',tag:'XXE'"
SecRule REQUEST_BODY "@rx \"\$(?:gt|lt|ne|eq|in|nin)\"" "id:990008,phase:2,deny,status:403,msg:'Custom NoSQLi Protection: MongoDB operator detected in JSON body',tag:'custom',tag:'NoSQLi'"
SecRule REQUEST_URI "@rx '\s*(?:OR|AND)\s*'.*=='" "id:990009,phase:1,deny,status:403,msg:'Custom NoSQLi Protection: URI based NoSQLi detected',tag:'custom',tag:'NoSQLi'"
SecRule REQUEST_URI "@rx \$where" "id:990010,phase:1,deny,status:403,msg:'Custom NoSQLi Protection: $where operator detected in URI',tag:'custom',tag:'NoSQLi'"
SecRule ARGS "@rx \{\{|$\{|\}\}" "id:990011,phase:2,deny,status:403,msg:'Custom SSTI Protection: Template markers detected',tag:'custom',tag:'SSTI'"
