SecRule REQUEST_URI "@contains /etc/passwd" "id:990001,phase:1,deny,status:403,msg:'Custom LFI Protection: etc/passwd access denied',tag:'custom',tag:'LFI'"
SecRule REQUEST_URI "@contains /etc/shadow" "id:990002,phase:1,deny,status:403,msg:'Custom LFI Protection: etc/shadow access denied',tag:'custom',tag:'LFI'"
SecRule REQUEST_URI "@rx windows[\\/]system32" "id:990003,phase:1,deny,status:403,msg:'Custom LFI Protection: Windows System32 access denied',tag:'custom',tag:'LFI'"
SecRule ARGS "@rx \x60" "id:990004,phase:2,deny,status:403,msg:'Custom CMDi Protection: Backtick operator detected',tag:'custom',tag:'CMDi'"
SecRule REQUEST_HEADERS:User-Agent "@rx \$\{jndi:" "id:990005,phase:1,deny,status:403,msg:'Custom Log4Shell Protection: JNDI in User-Agent',tag:'custom',tag:'RCE'"
SecRule ARGS "@rx \x0d\x0a" "id:990006,phase:2,deny,status:403,msg:'Custom Protocol Protection: CRLF Injection detected',tag:'custom',tag:'Protocol'"
SecRule REQUEST_BODY "@rx <!DOCTYPE|<!ENTITY" "id:990007,phase:2,deny,status:403,msg:'Custom XXE Protection: DTD/Entity detected in body',tag:'custom',tag:'XXE'"
SecRule ARGS_NAMES|ARGS|REQUEST_BODY "@rx \$(?:gt|lt|ne|eq|in|nin|where)" "id:990008,phase:2,deny,status:403,msg:'Custom NoSQLi Protection: MongoDB operator detected',tag:'custom',tag:'NoSQLi'"
SecRule REQUEST_URI "@rx (?i)(?:%20|\s|\+)+(?:or|and)(?:%20|\s|\+)+'.*==" "id:990009,phase:1,deny,status:403,msg:'Custom NoSQLi Protection: URI based NoSQLi detected',tag:'custom',tag:'NoSQLi'"
SecRule REQUEST_URI|ARGS_NAMES|ARGS "@rx \$where" "id:990010,phase:1,deny,status:403,msg:'Custom NoSQLi Protection: $where operator detected',tag:'custom',tag:'NoSQLi'"
SecRule ARGS|REQUEST_URI "@rx \{\{" "id:990011,phase:2,deny,status:403,msg:'Custom SSTI Protection: Handlebars Template markers detected',tag:'custom',tag:'SSTI'"
SecRule ARGS|REQUEST_URI "@rx \$\{" "id:990012,phase:2,deny,status:403,msg:'Custom SSTI Protection: EL/JEXL Template markers detected',tag:'custom',tag:'SSTI'"
